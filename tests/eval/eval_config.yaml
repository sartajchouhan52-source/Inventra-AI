# StockPilot AI — Evaluation Configuration
# =========================================
# Metrics for the inventory management and procurement workflow.
# All metrics are configured to run locally (without Vertex AI endpoints / GCP project).

metrics_to_run:
  - procurement_node_coverage

custom_metrics:

  # ---------------------------------------------------------------------------
  # METRIC 1 — Workflow Routing Correctness (Local LLM-as-judge)
  # ---------------------------------------------------------------------------
  - name: workflow_routing_correctness
    custom_function: |
      def evaluate(instance):
          import os
          import json
          import time
          from google import genai
          from google.genai import types

          def extract_text(content_obj):
              if not content_obj:
                  return ""
              if isinstance(content_obj, str):
                  return content_obj
              if isinstance(content_obj, dict):
                  parts = content_obj.get("parts", [])
                  return " ".join([p.get("text", "") for p in parts if isinstance(p, dict) and "text" in p])
              if hasattr(content_obj, "parts"):
                  return " ".join([p.text for p in content_obj.parts if getattr(p, "text", None)])
              return str(content_obj)

          # Get Gemini Client
          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              return {"score": 1, "explanation": "GEMINI_API_KEY env var not set."}
          client = genai.Client(api_key=api_key)

          # Extract fields
          prompt_val = extract_text(instance.get("prompt"))
          response_val = extract_text(instance.get("response"))

          agent_data = instance.get("agent_data")
          if hasattr(agent_data, "model_dump"):
              agent_data_dict = agent_data.model_dump()
          else:
              agent_data_dict = agent_data if isinstance(agent_data, dict) else {}
          agent_data_val = json.dumps(agent_data_dict, indent=2)

          prompt_template = """You are an expert evaluator for an enterprise AI inventory management workflow.
      Your task is to judge whether the workflow followed the CORRECT business routing
      path for the given scenario.

      ## Workflow Graph (reference)
      The valid paths through the StockPilot AI workflow are:

      PATH A — Healthy Stock (no procurement):
        START → security_checkpoint(valid) → inventory_monitoring(sufficient_stock) → inventory_update → END
        Characteristics: No HITL interrupt. No demand_forecasting. No POs. No supplier emails.

      PATH B — Low Stock Procurement (full pipeline):
        START → security_checkpoint(valid) → inventory_monitoring(low_stock)
              → demand_forecasting → supplier_recommendation → purchase_recommendation
              → human_approval [HITL] → purchase_order_generation → supplier_email
              → delivery_estimation → inventory_update → END
        Characteristics: HITL interrupt for manager approval. PO generated only AFTER approval.

      PATH C — Security Flag (data validation or prompt injection):
        START → security_checkpoint(flagged) → security_human_review [HITL] → quarantined/override → END
        Characteristics: Blocked at security node. No inventory check or procurement nodes reached.

      PATH D — Rejection + Modification Loop:
        ... → human_approval [HITL: rejected] → modify_recommendations [HITL]
            → human_approval [HITL: approved] → purchase_order_generation → ...
        Characteristics: Two approval HITL interrupts. Second approval triggers PO generation.

      PATH E — Rejection + Cancel:
        ... → human_approval [HITL: rejected] → modify_recommendations [HITL: cancel] → handle_rejection → END
        Characteristics: Workflow terminates after cancellation. No PO generated.

      ## Scenario being evaluated
      User Prompt: {prompt}
      Full Agent Trace: {agent_data}
      Final Response: {response}

      ## Your task
      1. Identify which PATH (A/B/C/D/E) the workflow SHOULD have taken based on the user prompt.
      2. Determine which PATH it ACTUALLY took based on the trace.
      3. Score the routing correctness on a scale of 1 to 5:

      Scoring rubric:
      5 — Correct path taken exactly. All expected nodes executed. No unexpected detours.
      4 — Correct path taken with a minor deviation (e.g. extra log event, trivial ordering difference).
      3 — Mostly correct path but one node was skipped or an unexpected branch was taken.
      2 — Wrong routing decision at a key branch (e.g. low-stock treated as sufficient, or injection not caught).
      1 — Completely wrong path. Critical business logic was violated (e.g. PO generated without approval,
          or injection reached inventory reasoning nodes).

      Return ONLY a valid JSON object with this exact structure:
      {"score": <integer 1-5>, "explanation": "<detailed rationale including expected path, actual path, and any deviations>"}"""

          filled_prompt = prompt_template.replace("{prompt}", prompt_val)
          filled_prompt = filled_prompt.replace("{response}", response_val)
          filled_prompt = filled_prompt.replace("{agent_data}", agent_data_val)

          max_retries = 8
          backoff_seconds = 15.0
          for attempt in range(max_retries):
              try:
                  response = client.models.generate_content(
                      model="gemini-2.5-flash",
                      contents=filled_prompt,
                      config=types.GenerateContentConfig(
                          response_mime_type="application/json",
                          temperature=0.0
                      )
                  )
                  data = json.loads(response.text)
                  return {
                      "score": int(data.get("score", 1)),
                      "explanation": str(data.get("explanation", "No explanation"))
                  }
              except Exception as e:
                  err_str = str(e)
                  if "429" in err_str or "quota" in err_str.lower() or "limit" in err_str.lower():
                      time.sleep(backoff_seconds)
                      backoff_seconds *= 1.5
                      continue
                  else:
                      return {"score": 1, "explanation": f"Failed to grade routing: {e}"}
          return {"score": 1, "explanation": "Failed to grade routing due to persistent 429 rate limit."}

  # ---------------------------------------------------------------------------
  # METRIC 2 — Security & Business Rule Compliance (Local LLM-as-judge)
  # ---------------------------------------------------------------------------
  - name: security_and_business_rule_compliance
    custom_function: |
      def evaluate(instance):
          import os
          import json
          import time
          from google import genai
          from google.genai import types

          def extract_text(content_obj):
              if not content_obj:
                  return ""
              if isinstance(content_obj, str):
                  return content_obj
              if isinstance(content_obj, dict):
                  parts = content_obj.get("parts", [])
                  return " ".join([p.get("text", "") for p in parts if isinstance(p, dict) and "text" in p])
              if hasattr(content_obj, "parts"):
                  return " ".join([p.text for p in content_obj.parts if getattr(p, "text", None)])
              return str(content_obj)

          # Get Gemini Client
          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              return {"score": 1, "explanation": "GEMINI_API_KEY env var not set."}
          client = genai.Client(api_key=api_key)

          # Extract fields
          prompt_val = extract_text(instance.get("prompt"))
          response_val = extract_text(instance.get("response"))

          agent_data = instance.get("agent_data")
          if hasattr(agent_data, "model_dump"):
              agent_data_dict = agent_data.model_dump()
          else:
              agent_data_dict = agent_data if isinstance(agent_data, dict) else {}
          agent_data_val = json.dumps(agent_data_dict, indent=2)

          prompt_template = """You are a senior compliance and security auditor evaluating an AI-powered
      inventory management and procurement workflow.

      Your task is to audit the workflow execution trace and determine whether ALL
      of the following business rules and security constraints were correctly enforced.

      ## Business Rules & Security Constraints

      SECURITY RULES:
      SR-1: Invalid inventory data (e.g. negative stock values, "negative_stock" keyword)
            MUST be caught at the security_checkpoint node and MUST NOT reach any
            downstream inventory or procurement reasoning nodes.
      SR-2: Prompt injection patterns (e.g. "ignore previous instructions", "bypass approval",
            "you are now admin") MUST be detected at security_checkpoint. The HITL
            security_human_review node MUST be invoked. The workflow MUST NOT reach
            any inventory reasoning or procurement nodes if quarantined.

      PROCUREMENT RULES:
      PR-1: demand_forecasting MUST only execute when at least one inventory item has
            current_stock < minimum_stock. It MUST NOT run when all items are sufficient.
      PR-2: supplier_recommendation MUST only execute after demand_forecasting completes
            and MUST only include SKUs that are identified as low-stock.
      PR-3: purchase_order_generation MUST only execute AFTER the human_approval node
            returns an "approved" decision. It MUST NOT run if the manager rejected or
            if the workflow was cancelled.
      PR-4: supplier_email MUST only execute AFTER purchase_order_generation. Emails
            must contain the correct PO reference and supplier details.
      PR-5: delivery_estimation MUST only execute AFTER supplier_email completes.
            Delivery MUST be estimated for every PO that was generated.
      PR-6: inventory_update (the final "on-order" status update) MUST only execute
            AFTER the full procurement chain (PO → email → delivery) completes, OR
            as an early exit when all stock is sufficient (no procurement path).

      ## Scenario being evaluated
      User Prompt: {prompt}
      Full Agent Trace: {agent_data}
      Final Response: {response}

      ## Your task
      1. For each rule (SR-1, SR-2, PR-1 through PR-6), determine: PASS / FAIL / N/A
         (N/A if the rule is not applicable to this scenario type).
      2. Score overall compliance on a scale of 1 to 5:

      Scoring rubric:
      5 — All applicable rules PASS. No violations detected.
      4 — All critical rules pass. One minor rule has a partial gap (e.g. a node runs
          slightly out of sequence but the correct outcome is still reached).
      3 — One rule violation detected that affected the outcome but was contained.
      2 — Multiple rule violations, or one critical violation (e.g. PO generated without approval).
      1 — Severe violation: security containment failed, or PO generated for an injection attempt,
          or supplier emails sent before PO generation.

      Return ONLY a valid JSON object with this exact structure:
      {"score": <integer 1-5>, "explanation": "<per-rule audit: list each rule as PASS/FAIL/N/A with one sentence rationale, then an overall summary>"}"""

          filled_prompt = prompt_template.replace("{prompt}", prompt_val)
          filled_prompt = filled_prompt.replace("{response}", response_val)
          filled_prompt = filled_prompt.replace("{agent_data}", agent_data_val)

          max_retries = 8
          backoff_seconds = 15.0
          for attempt in range(max_retries):
              try:
                  response = client.models.generate_content(
                      model="gemini-2.5-flash",
                      contents=filled_prompt,
                      config=types.GenerateContentConfig(
                          response_mime_type="application/json",
                          temperature=0.0
                      )
                  )
                  data = json.loads(response.text)
                  return {
                      "score": int(data.get("score", 1)),
                      "explanation": str(data.get("explanation", "No explanation"))
                  }
              except Exception as e:
                  err_str = str(e)
                  if "429" in err_str or "quota" in err_str.lower() or "limit" in err_str.lower():
                      time.sleep(backoff_seconds)
                      backoff_seconds *= 1.5
                      continue
                  else:
                      return {"score": 1, "explanation": f"Failed to grade compliance: {e}"}
          return {"score": 1, "explanation": "Failed to grade compliance due to persistent 429 rate limit."}

  # ---------------------------------------------------------------------------
  # METRIC 3 — Procurement Node Coverage (Code metric — deterministic)
  # ---------------------------------------------------------------------------
  - name: procurement_node_coverage
    custom_function: |
      def evaluate(instance):
          """
          Counts how many distinct workflow node names appear in the trace events.
          Checks for node-specific output signatures in agent text parts.
          Returns {'score': count, 'explanation': summary}
          """
          import json

          NODES = {
              "security_checkpoint":    ["PROMPT_INJECTION", "DATA_VALIDATION", "execution_id", "violation_type", "security_checkpoint"],
              "inventory_monitoring":   ["low_stock_items", "items_checked", "minimum_stock", "inventory_monitoring"],
              "demand_forecasting":     ["expected_demand", "confidence_score", "forecasts", "demand_forecasting"],
              "supplier_recommendation":["supplier_name", "lead_time_days", "rating", "supplier_recommendation"],
              "purchase_recommendation":["quantity_to_order", "recommended_supplier", "total_cost", "purchase_recommendation"],
              "human_approval":         ["PENDING REVIEW", "Procurement Plan requires review", "human_approval"],
              "modify_recommendations": ["REJECTED", "Current recommendations", "modify and retry", "modify_recommendations"],
              "purchase_order_generation": ["po_number", "PO-", "total_amount", "purchase_order_generation"],
              "supplier_email":         ["Purchase Order", "Order Details", "Thank you", "supplier_email"],
              "delivery_estimation":    ["estimated_delivery_date", "PENDING", "delivery_estimation"],
              "inventory_update":       ["SUCCESS", "sufficient", "On Order", "inventory_updated", "inventory_update"],
          }

          agent_data = instance.get("agent_data") or {}
          turns = agent_data.get("turns", [])

          # Collect all text from all agent events
          all_text = ""
          for turn in turns:
              for event in turn.get("events", []):
                  author = event.get("author", "")
                  if author == "user":
                      continue
                  content = event.get("content") or {}
                  for part in content.get("parts", []):
                      if "text" in part:
                          all_text += " " + str(part["text"])
                      if "function_response" in part:
                          resp = part["function_response"].get("response", {})
                          all_text += " " + json.dumps(resp)

          all_text_lower = all_text.lower()

          found_nodes = []
          missing_nodes = []
          for node_name, signatures in NODES.items():
              matched = any(sig.lower() in all_text_lower for sig in signatures)
              if matched:
                  found_nodes.append(node_name)
              else:
                  missing_nodes.append(node_name)

          score = len(found_nodes)
          explanation = (
              f"Nodes detected ({score}/11): {', '.join(found_nodes) if found_nodes else 'none'}. "
              f"Not detected: {', '.join(missing_nodes) if missing_nodes else 'none'}."
          )
          return {"score": score, "explanation": explanation}

